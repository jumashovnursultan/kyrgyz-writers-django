<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кирүү</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f0e8; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: linear-gradient(135deg, #1a472a, #2d6a4f); color: white; padding: 18px 30px; display: flex; align-items: center; gap: 16px; }
        header a { color: white; text-decoration: none; font-size: 1.4em; }
        header h1 { font-size: 1.3em; }
        .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .card h2 { color: #1a472a; margin-bottom: 6px; font-size: 1.5em; }
        .card p { color: #888; margin-bottom: 24px; font-size: 0.9em; }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-weight: 600; margin-bottom: 6px; color: #444; font-size: 0.9em; }
        .field input { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 1em; transition: border-color 0.2s; }
        .field input:focus { outline: none; border-color: #2d6a4f; }
        .errors { background: #fff0f0; border: 1px solid #ffcdd2; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; color: #c62828; font-size: 0.88em; }
        .btn-submit { width: 100%; padding: 13px; background: #2d6a4f; color: white; border: none; border-radius: 10px; font-size: 1em; font-weight: bold; cursor: pointer; }
        .btn-submit:hover { background: #1a472a; }
        .link-row { text-align: center; margin-top: 18px; font-size: 0.9em; color: #888; }
        .link-row a { color: #2d6a4f; font-weight: bold; text-decoration: none; }
        .messages { margin-bottom: 16px; }
        .msg { padding: 10px 14px; border-radius: 8px; font-size: 0.9em; margin-bottom: 8px; }
        .msg.error { background: #fff0f0; color: #c62828; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>
<header>
    <a href="{% url 'home' %}">←</a>
    <h1>Кирүү</h1>
</header>
<div class="page">
    <div class="card">
        <h2>📚 Кош келиңиз!</h2>
        <p>Аккаунтуңузга кириңиз</p>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="msg error">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="field">
                <label>Колдонуучу аты</label>
                <input type="text" name="username" autofocus>
            </div>
            <div class="field">
                <label>Сырсөз</label>
                <input type="password" name="password">
            </div>
            <button type="submit" class="btn-submit">Кирүү</button>
        </form>
        <div class="link-row">Аккаунтуңуз жокпу? <a href="{% url 'register' %}">Катталуу</a></div>
    </div>
</div>
</body>
</html>
